<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="480" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A020F0" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#FFB347" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="card1" x1="60" y1="80" x2="200" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF69B4"/>
      <stop offset="1" stop-color="#A020F0"/>
    </linearGradient>
    <linearGradient id="card2" x1="240" y1="100" x2="420" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB347"/>
      <stop offset="1" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="card3" x1="100" y1="240" x2="280" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A020F0"/>
      <stop offset="1" stop-color="#00C9FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(160,32,240,0.25)"/>
    </filter>
  </defs>

  <!-- Background blob -->
  <ellipse cx="240" cy="210" rx="200" ry="170" fill="url(#bg)"/>

  <!-- Card 1 — Music class -->
  <g filter="url(#shadow)" transform="translate(30,60)">
    <rect x="0" y="0" width="155" height="130" rx="20" fill="url(#card1)"/>
    <text x="77" y="58" text-anchor="middle" font-size="38" fill="white">🎵</text>
    <text x="77" y="88" text-anchor="middle" font-size="12" font-family="Poppins,sans-serif" fill="white" font-weight="700">Music Classes</text>
    <rect x="16" y="100" width="50" height="14" rx="7" fill="rgba(255,255,255,0.3)"/>
    <rect x="74" y="100" width="66" height="14" rx="7" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Card 2 — Sports -->
  <g filter="url(#shadow)" transform="translate(240,80)">
    <rect x="0" y="0" width="170" height="140" rx="20" fill="url(#card2)"/>
    <text x="85" y="64" text-anchor="middle" font-size="40" fill="white">⚽</text>
    <text x="85" y="96" text-anchor="middle" font-size="12" font-family="Poppins,sans-serif" fill="rgba(26,16,51,0.9)" font-weight="700">Sports Training</text>
    <rect x="20" y="110" width="55" height="14" rx="7" fill="rgba(255,255,255,0.5)"/>
    <rect x="83" y="110" width="65" height="14" rx="7" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- Card 3 — Art -->
  <g filter="url(#shadow)" transform="translate(90,230)">
    <rect x="0" y="0" width="165" height="130" rx="20" fill="url(#card3)"/>
    <text x="82" y="60" text-anchor="middle" font-size="38" fill="white">🎨</text>
    <text x="82" y="90" text-anchor="middle" font-size="12" font-family="Poppins,sans-serif" fill="white" font-weight="700">Art &amp; Craft</text>
    <rect x="16" y="104" width="148" height="14" rx="7" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- Floating stars -->
  <text x="230" y="50" font-size="22" opacity="0.8">⭐</text>
  <text x="410" y="240" font-size="18" opacity="0.7">✨</text>
  <text x="50" y="210" font-size="14" opacity="0.6">⭐</text>
  <text x="360" y="360" font-size="20" opacity="0.7">🌟</text>

  <!-- Floating pill badges -->
  <g transform="translate(295,248)">
    <rect width="100" height="28" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="50" y="19" text-anchor="middle" font-size="11" font-family="Poppins,sans-serif" fill="#A020F0" font-weight="700">📍 Near you</text>
  </g>
  <g transform="translate(22,195)">
    <rect width="110" height="28" rx="14" fill="white" filter="url(#shadow)"/>
    <text x="55" y="19" text-anchor="middle" font-size="11" font-family="Poppins,sans-serif" fill="#FF69B4" font-weight="700">⭐ Top Rated</text>
  </g>
</svg>
